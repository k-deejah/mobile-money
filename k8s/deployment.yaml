apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-money-stellar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mobile-money
  template:
    metadata:
      labels:
        app: mobile-money
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - "until pg_isready -h postgres-service -p 5432; do echo waiting for database; sleep 2; done;"
      containers:
        - name: backend
          image: mobile-money-backend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Add this block:
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: mobile-money-config
            - secretRef:
                name: mobile-money-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10